{% extends 'admin/base.html' %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-4">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <div class="eyebrow">Нова категорія</div>
        <h3 class="fw-bold mb-3">Додати категорію</h3>
        <form method="post">
          <input class="form-control mb-3" name="name" placeholder="Назва" required>
          <textarea class="form-control mb-3" rows="4" name="description" placeholder="Опис"></textarea>
          <button class="btn btn-electric w-100">Додати</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <div class="eyebrow">Категорії</div>
        <h3 class="fw-bold mb-3">Список категорій</h3>
        {% for category in categories %}
        <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
          <div>
            <strong>{{ category.name }}</strong>
            <div class="text-secondary small">{{ category.description }}</div>
          </div>
          <form method="post" action="{{ url_for('admin_category_delete', category_id=category.id) }}" onsubmit="return confirm('Видалити категорію?')">
            <button class="btn btn-sm btn-outline-danger">Видалити</button>
          </form>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
