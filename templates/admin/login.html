<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вхід в адмінку — AmperShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-card shadow-lg">
    <div class="eyebrow">AmperShop Admin</div>
    <h1 class="fw-bold mb-4">Вхід в адмінку</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
      <input class="form-control mb-3" type="password" name="password" placeholder="Пароль" required>
      <button class="btn btn-electric w-100">Увійти</button>
    </form>
  </div>
</body>
</html>
