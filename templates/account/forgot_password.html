{% extends 'base.html' %}
{% block title %}Відновлення пароля — AmperShop{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">
            <div class="eyebrow">Відновлення доступу</div>
            <h1 class="fw-bold mb-3">Забули пароль?</h1>
            <p class="text-secondary mb-4">Вкажіть email акаунта. Ми надішлемо лист з безпечним посиланням для встановлення нового пароля.</p>
            <form method="post">
              <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
              <button class="btn btn-electric w-100">Надіслати інструкцію</button>
            </form>
            <div class="text-center mt-3"><a href="{{ url_for('account_login') }}">Повернутися до входу</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
