{% extends 'base.html' %}
{% block title %}Реєстрація — AmperShop{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">
            <div class="eyebrow">Кабінет покупця</div>
            <h1 class="fw-bold mb-4">Створити акаунт</h1>
            <form method="post">
              <input class="form-control mb-3" name="full_name" placeholder="Ім'я та прізвище" required>
              <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
              <input class="form-control mb-3" type="password" name="password" placeholder="Пароль" required>
              <button class="btn btn-electric w-100">Створити акаунт</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
