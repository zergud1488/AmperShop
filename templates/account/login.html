{% extends 'base.html' %}
{% block title %}Вхід — AmperShop{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">
            <div class="eyebrow">Кабінет покупця</div>
            <h1 class="fw-bold mb-4">Увійти</h1>
            <form method="post">
              <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
              <input class="form-control mb-3" type="password" name="password" placeholder="Пароль" required>
              <button class="btn btn-electric w-100 mb-3">Увійти</button>
            </form>
            <a class="btn btn-outline-dark w-100 rounded-pill mb-3" href="{{ url_for('account_google_login') }}">Увійти через Google</a>
            <div class="text-secondary text-center">Немає акаунта? <a href="{{ url_for('account_register') }}">Зареєструватися</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
