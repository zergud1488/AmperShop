{% extends 'base.html' %}
{% block title %}Вхід — AmperShop{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">
            <div class="eyebrow">Кабінет покупця</div>
            <h1 class="fw-bold mb-4">Увійти</h1>
            <form method="post">
              <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
              <input class="form-control mb-3" type="password" name="password" placeholder="Пароль" required>
              <button class="btn btn-electric w-100 mb-3">Увійти</button>
            </form>
            <a class="btn btn-google w-100 rounded-pill mb-3" href="{{ url_for('account_google_login') }}"><svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.3 19 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2c-2.1 1.6-4.6 2.4-7.3 2.4-5.3 0-9.8-3.3-11.5-7.9l-6.5 5C9.3 39.5 16.1 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.8-2.8 4.9-4.9 6.5l.1-.1 6.2 5.2C36.2 39 44 33 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg><span>Увійти через Google</span></a>
            <div class="d-flex justify-content-between gap-3 small mb-3">
              <a href="{{ url_for('account_forgot_password') }}">Забули пароль?</a>
              <a href="{{ url_for('account_register') }}">Зареєструватися</a>
            </div>
            <div class="text-secondary text-center">Після реєстрації ми надішлемо лист для підтвердження email.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
