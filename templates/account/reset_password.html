{% extends 'base.html' %}
{% block title %}Новий пароль — AmperShop{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">
            <div class="eyebrow">Новий пароль</div>
            <h1 class="fw-bold mb-3">Оновіть пароль</h1>
            <form method="post">
              <input class="form-control mb-3" type="password" name="password" placeholder="Новий пароль" required>
              <input class="form-control mb-3" type="password" name="password_confirm" placeholder="Повторіть пароль" required>
              <button class="btn btn-electric w-100">Зберегти новий пароль</button>
            </form>
            <div class="text-center mt-3"><a href="{{ url_for('account_login') }}">Повернутися до входу</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
