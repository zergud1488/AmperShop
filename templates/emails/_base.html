<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;padding:0;background:#f6f6f8;font-family:Arial,sans-serif;color:#111}
    .wrap{max-width:640px;margin:0 auto;padding:24px}
    .card{background:#fff;border-radius:24px;padding:32px;border:1px solid #ececf1}
    .brand{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:16px}
    .muted{color:#666;line-height:1.6}
    .btn{display:inline-block;background:#0a0a0a;color:#fff!important;text-decoration:none;padding:14px 22px;border-radius:999px;font-weight:700;margin-top:18px}
    .meta{background:#fafafb;border:1px solid #ececf1;border-radius:18px;padding:18px;margin-top:20px}
    .item{padding:10px 0;border-bottom:1px solid #ededf2}
    .item:last-child{border-bottom:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">AmperShop</div>
      {% block body %}{% endblock %}
    </div>
  </div>
</body>
</html>
