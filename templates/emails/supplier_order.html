{% extends "emails/layout.html" %}
{% block body %}
<h2 style="margin:0 0 16px">Нове замовлення #{{ order.id }}</h2>
<p style="margin:0 0 16px">Клієнт: <b>{{ order.customer_name }} {{ order.customer_surname }}</b></p>
{% for item in items %}
<div style="padding:12px 0;border-top:1px solid #eee">
  <div><b>{{ item.title }}</b> × {{ item.quantity }}</div>
  <div style="color:#555">Ціна магазину: {{ '%.0f'|format(item.price or 0) }} грн</div>
</div>
{% endfor %}
{% endblock %}
